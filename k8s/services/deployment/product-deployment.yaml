apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert -f docker-compose.yml
    kompose.version: 1.31.2 (a92241f79)
  creationTimestamp: null
  labels:
    io.kompose.service: product
  name: product
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: product
  strategy: {}
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert -f docker-compose.yml
        kompose.version: 1.31.2 (a92241f79)
      creationTimestamp: null
      labels:
        io.kompose.network/lrn-k86-default: "true"
        io.kompose.service: product
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - args:
            - node
            - server.js
          image: game-stora-product
          imagePullPolicy: Always
          name: product
          ports:
            - containerPort: 3002
              protocol: TCP
          resources: {}
          env:
            - name: MONGO_USERNAME
              valueFrom:
                secretKeyRef:
                  name: product-secrets
                  key: MONGO_USERNAME
            - name: MONGO_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: product-secrets
                  key: MONGO_PASSWORD
            - name: MONGO_CLUSTER
              valueFrom:
                secretKeyRef:
                  name: product-secrets
                  key: MONGO_CLUSTER
            - name: MONGO_DBNAME
              valueFrom:
                secretKeyRef:
                  name: product-secrets
                  key: MONGO_DBNAME
            - name: ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: product-secrets
                  key: ACCESS_TOKEN
            - name: PORT
              valueFrom:
                secretKeyRef:
                  name: product-secrets
                  key: PORT
      restartPolicy: Always
status: {}
