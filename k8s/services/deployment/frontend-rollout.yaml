apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  annotations:
    kompose.cmd: kompose convert -f docker-compose.yml -o /tmp/kompose-out/
    kompose.service.type: nodeport
    kompose.version: 1.31.2 (a92241f79)
  creationTimestamp: null
  labels:
    io.kompose.service: frontend
  name: frontend
spec:
  strategy:
    canary:
      steps:
      - setWeight: 20
      - pause: {duration: 30s}
      - setWeight: 40
      - pause: {duration: 30s}
      - setWeight: 60
      - pause: {duration: 30s}
      - setWeight: 80
      - pause: {duration: 30s}
      - setWeight: 100
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: frontend
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert -f docker-compose.yml -o /tmp/kompose-out/
        kompose.service.type: nodeport
        kompose.version: 1.31.2 (a92241f79)
      creationTimestamp: null
      labels:
        io.kompose.network/lrn-k86-default: "true"
        io.kompose.service: frontend
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - image: game-stora-frontend
          imagePullPolicy: Always
          name: frontend
          ports:
            - containerPort: 80
             # hostPort: 9000
              protocol: TCP
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d
          resources: {}
      volumes:
        - name: nginx-config
          configMap:
            name: frontend-nginx-config
      restartPolicy: Always
status: {}
