apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert -f docker-compose.yml
    kompose.version: 1.31.2 (a92241f79)
  creationTimestamp: null
  labels:
    io.kompose.service: user
  name: user
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: user
  strategy: {}
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert -f docker-compose.yml
        kompose.version: 1.31.2 (a92241f79)
      creationTimestamp: null
      labels:
        io.kompose.network/lrn-k86-default: "true"
        io.kompose.service: user



    spec:
      containers:
        - args:
            - node
            - server.js
          image: ecommerce-user:latest
          imagePullPolicy: Never
          name: user
          ports:
            - containerPort: 3001
              protocol: TCP
          resources: {}

          env:
            - name: MONGO_USERNAME
              valueFrom:
                secretKeyRef:
                  name: user-secrets
                  key: MONGO_USERNAME
            - name: MONGO_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: user-secrets
                  key: MONGO_PASSWORD
            - name: MONGO_CLUSTER
              valueFrom:
                secretKeyRef:
                  name: user-secrets
                  key: MONGO_CLUSTER
            - name: MONGO_DBNAME
              valueFrom:
                secretKeyRef:
                  name: user-secrets
                  key: MONGO_DBNAME
            - name: ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: user-secrets
                  key: ACCESS_TOKEN
            - name: PORT
              valueFrom:
                secretKeyRef:
                  name: user-secrets
                  key: PORT
      restartPolicy: Always
status: {}
