apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  annotations:
    kompose.cmd: kompose convert -f docker-compose.yml
    kompose.version: 1.31.2 (a92241f79)
  creationTimestamp: null
  labels:
    io.kompose.service: product
  name: product
spec:
  strategy:
    canary:
      steps:
      - setWeight: 20
      - pause: {duration: 30s}
      - setWeight: 40
      - pause: {duration: 30s}
      - setWeight: 60
      - pause: {duration: 30s}
      - setWeight: 80
      - pause: {duration: 30s}
      - setWeight: 100
  replicas: 3
  progressDeadlineSeconds: 120
  selector:
    matchLabels:
      io.kompose.service: product
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert -f docker-compose.yml
        kompose.version: 1.31.2 (a92241f79)
      creationTimestamp: null
      labels:
        io.kompose.network/lrn-k86-default: "true"
        io.kompose.service: product
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - args:
            - node
            - server.js
          image: game-stora-product
          imagePullPolicy: Always
          name: product
          ports:
            - containerPort: 3002
              protocol: TCP
          resources: {}
          readinessProbe:
            tcpSocket:
              port: 3002
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
          env:
            - name: MONGO_USERNAME
              valueFrom:
                secretKeyRef:
                  name: product-secrets
                  key: MONGO_USERNAME
            - name: MONGO_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: product-secrets
                  key: MONGO_PASSWORD
            - name: MONGO_CLUSTER
              valueFrom:
                secretKeyRef:
                  name: product-secrets
                  key: MONGO_CLUSTER
            - name: MONGO_DBNAME
              valueFrom:
                secretKeyRef:
                  name: product-secrets
                  key: MONGO_DBNAME
            - name: ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: product-secrets
                  key: ACCESS_TOKEN
            - name: PORT
              valueFrom:
                secretKeyRef:
                  name: product-secrets
                  key: PORT
      restartPolicy: Always
status: {}
